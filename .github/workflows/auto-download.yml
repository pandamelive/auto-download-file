name: 定时下载文件到download文件夹

# 定时规则（UTC时间，北京时间=UTC+8，示例：每天凌晨2点执行）
on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = 北京时间次日 2:00
  workflow_dispatch:  # 保留手动触发功能

permissions:
  contents: write  # 允许写入仓库内容（推送代码）
  actions: read     # 补充基础权限，避免潜在权限问题

jobs:
  download-file:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 设置任务超时时间，避免卡死
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 仅拉取最新代码，提升速度

      - name: 初始化环境与变量（统一北京时间）
        id: init
        run: |
          # ========== 1. 定义核心变量 ==========
          FILE_PATH="./download/qilan_data.yaml"
          TEMP_FILE="./download/qilan_data_temp.yaml"
          VERSION_TIME_FILE="./download/version_time.txt"  # 存储最新版本时间的文件
          
          # ========== 2. 获取本次工作流运行时间（纯北京时间） ==========
          CHECK_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S 北京时间')
          
          # ========== 3. 读取历史最新版本时间（无则设为"未更新"） ==========
          if [ -f "$VERSION_TIME_FILE" ] && [ -s "$VERSION_TIME_FILE" ]; then
            LAST_VERSION_TIME=$(cat "$VERSION_TIME_FILE")
          else
            LAST_VERSION_TIME="未更新"
          fi
          
          # ========== 4. 输出变量供后续步骤使用 ==========
          echo "check_time=$CHECK_TIME" >> "$GITHUB_OUTPUT"
          echo "last_version_time=$LAST_VERSION_TIME" >> "$GITHUB_OUTPUT"
          echo "file_path=$FILE_PATH" >> "$GITHUB_OUTPUT"
          echo "temp_file=$TEMP_FILE" >> "$GITHUB_OUTPUT"
          echo "version_time_file=$VERSION_TIME_FILE" >> "$GITHUB_OUTPUT"
          
          # ========== 5. 创建必要文件夹 ==========
          mkdir -p ./download
          echo "========================================"
          echo "📅 本次检查时间（工作流运行时间）：$CHECK_TIME"
          echo "📌 历史最新版本时间：$LAST_VERSION_TIME"
          echo "========================================"

      - name: 下载并对比文件
        id: download
        run: |
          # 读取初始化变量
          FILE_PATH="${{ steps.init.outputs.file_path }}"
          TEMP_FILE="${{ steps.init.outputs.temp_file }}"
          VERSION_TIME_FILE="${{ steps.init.outputs.version_time_file }}"
          
          # ========== 1. 下载最新文件 ==========
          echo "📥 开始下载最新文件..."
          curl -sSL --connect-timeout 60 --max-time 120 --retry 3 \
            -o "$TEMP_FILE" \
            "https://qilan.de/api/subscription/5446fc526d8945954b9b442329da129ffec466fd36c5a2ac"
          
          # ========== 2. 验证下载结果 ==========
          if [ ! -f "$TEMP_FILE" ] || [ ! -s "$TEMP_FILE" ]; then
            echo "❌ 最新文件下载失败或文件为空"
            ls -lh ./download/
            rm -f "$TEMP_FILE"
            echo "is_updated=false" >> "$GITHUB_OUTPUT"
            exit 0  # 下载失败不终止工作流，仅标记未更新
          fi
          echo "✅ 最新文件下载成功，大小：$(du -h "$TEMP_FILE" | awk '{print $1}')"
          
          # ========== 3. MD5对比判断是否需要更新 ==========
          if [ -f "$FILE_PATH" ] && [ -s "$FILE_PATH" ]; then
            TEMP_MD5=$(md5sum "$TEMP_FILE" | awk '{print $1}')
            LOCAL_MD5=$(md5sum "$FILE_PATH" | awk '{print $1}')
            
            if [ "$TEMP_MD5" = "$LOCAL_MD5" ]; then
              echo "✅ 文件无更新，保持历史版本时间"
              echo "is_updated=false" >> "$GITHUB_OUTPUT"
              rm -f "$TEMP_FILE"
              exit 0
            else
              echo "🔄 检测到文件更新，开始替换..."
              mv -f "$TEMP_FILE" "$FILE_PATH"
              echo "is_updated=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "📁 本地无有效文件，直接使用新下载的文件"
            mv -f "$TEMP_FILE" "$FILE_PATH"
            echo "is_updated=true" >> "$GITHUB_OUTPUT"
          fi
          
          # ========== 4. 更新版本时间（纯北京时间） ==========
          NEW_VERSION_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S 北京时间')
          echo "$NEW_VERSION_TIME" > "$VERSION_TIME_FILE"
          echo "new_version_time=$NEW_VERSION_TIME" >> "$GITHUB_OUTPUT"
          echo "✅ 最新版本时间已更新为：$NEW_VERSION_TIME"

      - name: 更新README文件（统一北京时间展示）
        run: |
          # ========== 核心修复：修正变量引用格式 ==========
          # 读取所有关键变量（正确引用GitHub Actions输出变量，增加默认值）
          CHECK_TIME="${{ steps.init.outputs.check_time || '未知时间（北京时间）' }}"
          IS_UPDATED="${{ steps.download.outputs.is_updated || 'false' }}"
          LAST_VERSION_TIME="${{ steps.init.outputs.last_version_time || '未更新' }}"
          NEW_VERSION_TIME="${{ steps.download.outputs.new_version_time || steps.init.outputs.last_version_time || '未更新' }}"
          
          # 确定最终显示的最新版本时间
          if [ "$IS_UPDATED" = "true" ]; then
            FINAL_VERSION_TIME="$NEW_VERSION_TIME"
            UPDATE_STATUS="✅ 是"
          else
            FINAL_VERSION_TIME="$LAST_VERSION_TIME"
            UPDATE_STATUS="❌ 否"
          fi
          
          # 构造README内容（纯北京时间展示）
          STATUS_CONTENT=$(echo -e "## 数据更新状态\n| 项目 | 详情 |\n|------|------|\n| 最后检查时间（工作流运行时间） | $CHECK_TIME |\n| 最新版本时间（最后一次更新） | $FINAL_VERSION_TIME |\n| 本次是否更新文件 | $UPDATE_STATUS |")
          
          # 更新README（兼容无文件/已有标记位场景）
          README_FILE="./README.md"
          if [ ! -f "$README_FILE" ]; then
            touch "$README_FILE"
          fi
          
          # 删除旧状态，追加新状态
          sed -i '/<!-- DATA_STATUS_START -->/,/<!-- DATA_STATUS_END -->/d' "$README_FILE"
          echo -e "\n<!-- DATA_STATUS_START -->" >> "$README_FILE"
          echo -e "$STATUS_CONTENT" >> "$README_FILE"
          echo "<!-- DATA_STATUS_END -->" >> "$README_FILE"
          
          echo "📝 README更新完成："
          echo "------------------------------"
          echo -e "$STATUS_CONTENT"
          echo "------------------------------"

      - name: 推送所有变更到仓库
        run: |
          # 配置Git身份
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 添加所有变更文件（忽略不存在的文件报错）
          git add ./download/* ./README.md 2>/dev/null
          
          # 检查是否有可提交的内容
          if git diff --cached --quiet; then
            echo "ℹ️ 无文件变更，无需提交"
          else
            # 提交信息使用纯北京时间
            COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
            git commit -m "Auto update: $COMMIT_TIME 北京时间 | Check time: ${{ steps.init.outputs.check_time }}"
            git push
            echo "✅ 所有变更已推送至仓库"
          fi
