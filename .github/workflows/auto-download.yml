name: 定时下载文件到download文件夹

# 定时规则（UTC时间，北京时间+8小时，示例：每天凌晨2点执行）
on:
  schedule:
    - cron: '0 18 * * *'  # 对应北京时间 次日2:00
  workflow_dispatch:  # 保留手动触发功能

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 创建download文件夹并下载文件
        run: |
          # 创建根目录的download文件夹（不存在则创建）
          mkdir -p ./download
          # 下载文件到download文件夹根目录
          curl -s -o ./download/qilan_data.csv -L --connect-timeout 60 "https://qilan.de/api/subscription/5446fc526d8945954b9b442329da129ffec466fd36c5a2ac"
          # 验证文件是否下载成功
          if [ ! -s ./download/qilan_data.csv ]; then
            echo "❌ 文件下载失败或为空"
            exit 1
          fi

      - name: 推送文件到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./download/*
          git commit -m "Auto update file: $(date +'%Y-%m-%d')"
          git push
